<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- Подключаем библиотеку Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            /* Используем переменные темы Telegram, чтобы цвета подстраивались сами */
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        button {
            padding: 15px 30px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Привет, <span id="username"></span>!</h1>
    <p>Это твой личный кабинет</p>
    <button onclick="sendData()">Отправить данные боту</button>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Выводим имя пользователя из данных Telegram
        document.getElementById("username").innerText = tg.initDataUnsafe.user.first_name;

        // Функция для отправки данных обратно в чат
        function sendData() {
            tg.sendData("Пользователь нажал на кнопку в приложении!"); 
            // Это закроет приложение и отправит текст боту
        }
    </script>
</body>
</html>
