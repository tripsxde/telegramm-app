<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Мое Mini App</title>
    <!-- Подключаем скрипт Telegram, чтобы сайт понимал, что он в боте -->
    <script src="https://telegram.org"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        button { padding: 10px 20px; background: #248bcf; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Привет! Это мое приложение</h1>
    <p>Вы открыли его из Telegram.</p>
    <button onclick="Telegram.WebApp.close()">Закрыть приложение</button>
</body>
</html>
