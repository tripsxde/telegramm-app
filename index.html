<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #17212b; /* Темно-синий фон как на скрине */
            color: #ffffff;
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }

        /* Шапка */
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #17212b;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Сетка товаров */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }

        .product-card {
            background-color: #242f3d;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        /* Стиль для картинок и флагов */
        .product-img {
            width: 100%;
            height: 100px;
            border-radius: 8px;
            margin-bottom: 10px;
            object-fit: cover; /* Чтобы фото Рей было ровным */
            background: #2b3745;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            height: 35px;
            overflow: hidden;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #64b5f6;
        }

        .buy-btn {
            margin-top: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Нижнее меню */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #17212b;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #242f3d;
        }

        .nav-item { text-align: center; font-size: 10px; color: #6c7883; }
        .nav-item.active { color: #3498db; }
    </style>
</head>
<body>

    <div class="header">
        <span>☰</span>
        <h1 style="font-size: 18px; margin: 0;">FloydShop</h1>
        <span>🔍</span>
    </div>

    <div class="product-grid">
        <!-- Услуга 1 -->
        <div class="product-card">
            <div class="product-img">🇺🇸</div>
            <div class="product-name">Telegram (США)</div>
            <div class="product-price">200 ₽</div>
            <button class="buy-btn" onclick="buy('TG USA')">Купить</button>
        </div>

        <!-- Услуга 2 -->
        <div class="product-card">
            <div class="product-img">🇰🇿</div>
            <div class="product-name">Telegram (Казахстан)</div>
            <div class="product-price">300 ₽</div>
            <button class="buy-btn" onclick="buy('TG KZ')">Купить</button>
        </div>

        <!-- Услуга 3 -->
        <div class="product-card">
            <div class="product-img">🇰🇿</div>
            <div class="product-name">VK (Казахстан)</div>
            <div class="product-price">250 ₽</div>
            <button class="buy-btn" onclick="buy('VK KZ')">Купить</button>
        </div>

        <!-- Услуга 4 (С КАРТИНКОЙ РЕЙ) -->
        <div class="product-card">
            <img src="https://imgur.com" class="product-img">
            <div class="product-name">Tinder / Galaxy</div>
            <div class="product-price">Скоро</div>
            <button class="buy-btn" style="background-color: #444;" onclick="tg.showAlert('Эта услуга появится скоро!')">Ожидается</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">🏠<br>Главная</div>
        <div class="nav-item">❤️<br>Избранное</div>
        <div class="nav-item">🛒<br>Корзина</div>
        <div class="nav-item">👤<br>Профиль</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function buy(item) {
            tg.sendData("Купить: " + item);
        }
    </script>
</body>
</html>
