<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #17212b; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .page { display: none; padding-bottom: 80px; }
        .active-page { display: block; }
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #17212b; border-bottom: 1px solid #242f3d; }
        .banner-container { width: 100%; cursor: pointer; background: #fff; }
        .banner-img { width: 100%; display: block; height: auto; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .product-card { background: #242f3d; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        .product-img { width: 100%; height: 100px; border-radius: 8px; object-fit: cover; margin-bottom: 10px; background: #2b3745; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .buy-btn { margin-top: 10px; background: #3498db; color: #fff; border: none; border-radius: 6px; padding: 8px; font-weight: bold; cursor: pointer; }
        .cart-item { background: #242f3d; margin: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; }
        .profile-container { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
        .user-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #3498db; object-fit: cover; margin-bottom: 15px; background: #242f3d; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #17212b; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #242f3d; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #6c7883; cursor: pointer; }
        .nav-item.active { color: #3498db; }
    </style>
</head>
<body>
    <div id="main-page" class="page active-page">
        <div class="top-bar"><span>☰</span><h1 style="font-size:18px;margin:0;">23 | rei</h1><span onclick="tg.showAlert('Поиск скоро')">🔍</span></div>
        <div class="banner-container" onclick="tg.openTelegramLink('https://t.me')">
            <img src="./87712C11-DC80-474C-B501-3BB3E86C794E.jpg" class="banner-img">
        </div>
        <div class="product-grid">
            <div class="product-card"><div class="product-img">🇺🇸</div><p style="margin:0;font-size:13px;">Telegram (США)</p><b>200 ₽</b><button class="buy-btn" onclick="addToCart('TG (США)', 200)">В корзину</button></div>
            <div class="product-card"><div class="product-img">🇰🇿</div><p style="margin:0;font-size:13px;">Telegram (КЗ)</p><b>300 ₽</b><button class="buy-btn" onclick="addToCart('TG (КЗ)', 300)">В корзину</button></div>
            <div class="product-card"><div class="product-img">🇰🇿</div><p style="margin:0;font-size:13px;">VK (КЗ)</p><b>250 ₽</b><button class="buy-btn" onclick="addToCart('VK (КЗ)', 250)">В корзину</button></div>
            <div class="product-card"><img src="IMG_0485.jpg" class="product-img"><p style="margin:0;font-size:13px;">Tinder</p><b>Скоро</b><button class="buy-btn" style="background:#444;">Ожидается</button></div>
        </div>
    </div>

    <div id="cart-page" class="page">
        <div class="top-bar"><h1 style="margin:0 auto; font-size:18px;">Корзина</h1></div>
        <div id="cart-list"></div>
        <div style="padding:20px; text-align:center;">
            <h3>Итого: <span id="total">0</span> ₽</h3>
            <button class="buy-btn" style="width:100%; background:#2ecc71;" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="top-bar"><h1 style="margin:0 auto; font-size:18px;">Мой профиль</h1></div>
        <div class="profile-container">
            <img id="u-pic" class="user-avatar" src="">
            <div id="u-name" style="font-size:20px; font-weight:bold;">Загрузка...</div>
            <div id="u-nick" style="color:#3498db; margin-top:5px;">@username</div>
            <div id="u-id" style="font-size:12px; color:grey; margin-top:5px;">ID: 000000</div>
        </div>
    </div>

    <div class="nav-bar">
        <div id="n-main" class="nav-item active" onclick="show('main')">🏠<br>Главная</div>
        <div id="n-cart" class="nav-item" onclick="show('cart')">🛒<br>Корзина (<span id="count">0</span>)</div>
        <div id="n-prof" class="nav-item" onclick="show('profile')">👤<br>Профиль</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let cart = [];
        const reis = ['IMG_0485.jpg', 'IMG_0489.jpg', 'IMG_0490.jpg', 'IMG_0491.jpg', 'IMG_0492.jpg'];

        function addToCart(n, p) {
            cart.push({n, p});
            document.getElementById('count').innerText = cart.length;
            updateCart();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateCart() {
            let res = ''; let t = 0;
            cart.forEach((i, idx) => {
                t += i.p;
                res += `<div class="cart-item"><span>${i.n}</span><b>${i.p} ₽</b><span onclick="rem(${idx})" style="color:red;cursor:pointer;">✕</span></div>`;
            });
            document.getElementById('cart-list').innerHTML = res;
            document.getElementById('total').innerText = t;
        }

        function rem(i) { cart.splice(i, 1); document.getElementById('count').innerText = cart.length; updateCart(); }
        function checkout() { if(cart.length) tg.sendData("Заказ: " + cart.map(x=>x.n).join(", ")); }

        function render() {
            const u = tg.initDataUnsafe?.user;
            if (u) {
                document.getElementById("u-name").innerText = u.first_name + (u.last_name ? " " + u.last_name : "");
                document.getElementById("u-nick").innerText = u.username ? "@" + u.username : "ID: " + u.id;
                document.getElementById("u-id").innerText = "ID: " + u.id;
                if (u.photo_url) { document.getElementById("u-pic").src = u.photo_url; }
                else { 
                    const r = reis[Math.floor(Math.random() * reis.length)];
                    document.getElementById("u-pic").src = "./" + r;
                }
            } else { setTimeout(render, 500); }
        }
        render();

        function show(p) {
            ['main-page', 'cart-page', 'profile-page'].forEach(x => document.getElementById(x).style.display = 'none');
            ['n-main', 'n-cart', 'n-prof'].forEach(x => document.getElementById(x).classList.remove('active'));
            document.getElementById(p + '-page').style.display = 'block';
            document.getElementById('n-' + p).classList.add('active');
        }
    </script>
</body>
</html>
