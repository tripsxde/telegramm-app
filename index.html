<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #17212b;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Общие стили страниц */
        .page {
            display: none; /* Скрываем все страницы по умолчанию */
            padding-bottom: 80px;
            animation: fadeIn 0.3s ease;
        }
        .active-page { display: block; } /* Показываем только активную */

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Шапка */
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #17212b;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Сетка товаров */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }

        .product-card {
            background-color: #242f3d;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .product-img {
            width: 100%; height: 100px; border-radius: 8px; margin-bottom: 10px;
            object-fit: cover; background: #2b3745; display: flex;
            align-items: center; justify-content: center; font-size: 24px;
        }

        .product-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .product-price { font-size: 16px; font-weight: bold; color: #64b5f6; }

        .buy-btn {
            margin-top: 10px; background-color: #3498db; color: white;
            border: none; border-radius: 6px; padding: 8px; font-weight: bold; cursor: pointer;
        }

        /* Стили профиля */
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .user-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background-color: #3498db; margin-bottom: 15px;
            border: 3px solid #242f3d; object-fit: cover;
        }
        .user-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .user-id { font-size: 14px; color: #6c7883; margin-bottom: 20px; }
        
        .balance-card {
            background-color: #242f3d;
            width: 100%; border-radius: 15px; padding: 20px;
            text-align: center; box-sizing: border-box;
        }
        .balance-amount { font-size: 32px; font-weight: bold; color: #64b5f6; margin-top: 10px; }

        /* Нижнее меню */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background-color: #17212b; display: flex;
            justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #242f3d; z-index: 100;
        }
        .nav-item { text-align: center; font-size: 10px; color: #6c7883; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #3498db; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- СТРАНИЦА МАГАЗИНА -->
    <div id="main-page" class="page active-page">
        <div class="header">
            <span>☰</span>
            <h1 style="font-size: 18px; margin: 0;">FloydShop</h1>
            <span>🔍</span>
        </div>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">US</div>
                <div class="product-name">Telegram (США)</div>
                <div class="product-price">200 ₽</div>
                <button class="buy-btn" onclick="buy('TG USA')">Купить</button>
            </div>
            <div class="product-card">
                <div class="product-img">KZ</div>
                <div class="product-name">Telegram (Казахстан)</div>
                <div class="product-price">300 ₽</div>
                <button class="buy-btn" onclick="buy('TG KZ')">Купить</button>
            </div>
            <div class="product-card">
                <div class="product-img">KZ</div>
                <div class="product-name">VK (Казахстан)</div>
                <div class="product-price">250 ₽</div>
                <button class="buy-btn" onclick="buy('VK KZ')">Купить</button>
            </div>
            <div class="product-card">
                <img src="./IMG_0485.jpg" class="product-img" onerror="this.src='https://placeholder.com'">
                <div class="product-name">Tinder / Galaxy</div>
                <div class="product-price">Скоро</div>
                <button class="buy-btn" style="background-color: #444;" onclick="tg.showAlert('Эта услуга появится скоро!')">Ожидается</button>
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА ПРОФИЛЯ -->
    <div id="profile-page" class="page">
        <div class="header">
            <h1 style="font-size: 18px; margin: 0; width: 100%; text-align: center;">Личный кабинет</h1>
        </div>
        <div class="profile-container">
            <img id="user-photo" class="user-avatar" src="https://placeholder.com" alt="Avatar">
            <div id="user-full-name" class="user-name">Пользователь</div>
            <div id="user-id-label" class="user-id">ID: 00000000</div>
            
            <div class="balance-card">
                <div style="font-size: 14px; opacity: 0.7;">Ваш баланс</div>
                <div class="balance-amount">0.00 ₽</div>
                <button class="buy-btn" style="margin-top: 15px;" onclick="tg.showAlert('Пополнение пока недоступно')">Пополнить</button>
            </div>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="nav-bar">
        <div id="nav-main" class="nav-item active" onclick="showPage('main')">
            <span class="nav-icon">🏠</span>Главная
        </div>
        <div class="nav-item" onclick="tg.showAlert('Раздел в разработке')">
            <span class="nav-icon">🛒</span>Корзина
        </div>
        <div id="nav-profile" class="nav-item" onclick="showPage('profile')">
            <span class="nav-icon">👤</span>Профиль
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Подтягиваем данные из Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById("user-full-name").innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
            document.getElementById("user-id-label").innerText = "ID: " + user.id;
            
            // Если у пользователя есть аватарка в телеграм, пробуем её получить (работает только через Bot API)
            if (user.photo_url) {
                document.getElementById("user-photo").src = user.photo_url;
            }
        }

        // Функция переключения страниц
        function showPage(pageName) {
            // Скрываем все страницы
            document.getElementById('main-page').classList.remove('active-page');
            document.getElementById('profile-page').classList.remove('active-page');
            document.getElementById('nav-main').classList.remove('active');
            document.getElementById('nav-profile').classList.remove('active');

            // Показываем нужную
            if (pageName === 'main') {
                document.getElementById('main-page').classList.add('active-page');
                document.getElementById('nav-main').classList.add('active');
            } else if (pageName === 'profile') {
                document.getElementById('profile-page').classList.add('active-page');
                document.getElementById('nav-profile').classList.add('active');
            }
        }

        function buy(item) {
            tg.sendData("Купить: " + item);
        }
    </script>
</body>
</html>
